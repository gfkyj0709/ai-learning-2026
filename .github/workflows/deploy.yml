# GitHub Actions CI/CD Pipeline for FDS AI Assistant
# FDS AI Assistant CI/CD 파이프라인

name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    # Use self-hosted runner on VM / VM의 Self-hosted Runner 사용
    runs-on: self-hosted

    steps:
      # 1. Checkout source code / 소스코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up JDK 21 / JDK 21 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Login to Docker Hub / Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Build and push eureka-server / eureka-server 빌드 및 푸시
      - name: Build and push eureka-server
        uses: docker/build-push-action@v5
        with:
          context: ./phase2/eureka-server
          push: true
          tags: youngjinkwon/eureka-server:latest

      # 5. Build and push api-gateway / api-gateway 빌드 및 푸시
      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./phase2/api-gateway
          push: true
          tags: youngjinkwon/api-gateway:latest

      # 6. Build and push rag-demo / rag-demo 빌드 및 푸시
      - name: Build and push rag-demo
        uses: docker/build-push-action@v5
        with:
          context: ./phase2/rag-demo
          push: true
          tags: youngjinkwon/rag-demo:latest

      # 7. Deploy with docker compose / docker compose로 배포
      - name: Deploy
        run: |
          cd ~/ai-learning-2026/phase2
          docker compose pull
          docker compose up -d
