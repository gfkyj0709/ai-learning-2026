# GitHub Actions CI/CD Pipeline for FDS AI Assistant
# FDS AI Assistant CI/CD 파이프라인
name: CI/CD Pipeline
on:
  push:
    branches: [ main ]
jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push eureka-server
        uses: docker/build-push-action@v5
        with:
          context: ./phase2/eureka-server
          push: true
          tags: youngjinkwon/eureka-server:latest

      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./phase2/api-gateway
          push: true
          tags: youngjinkwon/api-gateway:latest

      - name: Build and push rag-demo
        uses: docker/build-push-action@v5
        with:
          context: ./phase2/rag-demo
          push: true
          tags: youngjinkwon/rag-demo:latest

      # Stop and remove existing containers before deploy
      # 배포 전 기존 컨테이너 정리
      - name: Cleanup existing containers
        run: |
          cd ~/ai-learning-2026/phase2
          docker compose down --remove-orphans || true

      # Deploy with latest images / 최신 이미지로 배포
      - name: Deploy
        run: |
          cd ~/ai-learning-2026/phase2
          docker compose pull
          docker compose up -d
