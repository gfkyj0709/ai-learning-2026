# Nginx Blue/Green Deployment Configuration
# Blue/Green 무중단 배포를 위한 Nginx 설정

events {
    worker_connections 1024;
}

http {
    # Upstream - 현재 활성 서비스로 라우팅 / Route to active service
    upstream rag-demo {
        server rag-demo-blue:8085;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://rag-demo;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
