server:
  # Config Server 수신 포트 (Spring Cloud Config 기본 포트) / Config Server port (Spring Cloud Config default)
  port: 8888

spring:
  application:
    # Eureka에 등록될 서비스 이름 / Service name registered in Eureka
    name: config-server

  profiles:
    # native 프로파일: Git 없이 로컬 파일 시스템에서 설정 파일을 읽습니다.
    # native profile: reads config files from local filesystem without Git.
    active: native

  cloud:
    config:
      server:
        native:
          # 설정 파일 위치: classpath:/config 디렉토리 (src/main/resources/config/)
          # Config file location: classpath:/config directory (src/main/resources/config/)
          # 클라이언트가 요청하면 해당 디렉토리에서 {application}.yml 파일을 찾습니다.
          # When a client requests, searches for {application}.yml in this directory.
          search-locations: classpath:/config

# ──────────────────────────────────────────────────────────────────────────────
# Eureka 클라이언트 설정 / Eureka client configuration
#   config-server를 eureka-server(8761)에 등록하여
#   클라이언트들이 서비스 이름으로 Config Server를 탐색할 수 있게 합니다.
#   Registers config-server with eureka-server (8761) so that
#   clients can discover Config Server by service name.
# ──────────────────────────────────────────────────────────────────────────────
eureka:
  instance:
    # 호스트명 대신 IP 주소로 Eureka에 등록 (컨테이너/멀티-호스트 환경 호환)
    # Register with IP address instead of hostname (compatible with container/multi-host env)
    prefer-ip-address: true

  client:
    service-url:
      # Eureka 서버 주소 — eureka-server 프로젝트의 기본 포트(8761)
      # Eureka server address — default port (8761) of the eureka-server project
      defaultZone: http://localhost:8761/eureka/

# ──────────────────────────────────────────────────────────────────────────────
# Actuator 설정 / Actuator configuration
#   /actuator/health — 서버 헬스 확인 / Check server health
#   /actuator/env    — 환경 변수 및 설정 확인 / Inspect environment variables and config
# ──────────────────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        # health, info, env 엔드포인트 노출 / Expose health, info, and env endpoints
        include: health,info,env
  endpoint:
    health:
      # 헬스 상세 정보 항상 표시 / Always show health details
      show-details: always

logging:
  level:
    # Config Server 디버그 로그 / Config Server debug logs
    org.springframework.cloud.config: DEBUG
