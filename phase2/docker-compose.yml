# Integrated Docker Compose for FDS AI Assistant MSA
# FDS AI Assistant MSA 통합 Docker Compose

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=fdsdb
      - POSTGRES_USER=fds
      - POSTGRES_PASSWORD=fds1234
    volumes:
      - phase2_postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - phase2_redis-data:/data
    restart: unless-stopped

  # Qdrant Vector DB - 벡터 데이터베이스
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - phase2_qdrant-data:/qdrant/storage
    restart: unless-stopped

  # Eureka Server - 서비스 디스커버리
  eureka-server:
    image: youngjinkwon/eureka-server:latest
    container_name: eureka-server
    ports:
      - "8761:8761"
    restart: unless-stopped

  # API Gateway - 외부 요청 라우팅
  api-gateway:
    image: youngjinkwon/api-gateway:latest
    container_name: api-gateway
    ports:
      - "8084:8084"
    depends_on:
      - eureka-server
    restart: unless-stopped

  # RAG Demo - FDS 문서 질의응답
  rag-demo:
    image: youngjinkwon/rag-demo:latest
    container_name: rag-demo
    ports:
      - "8085:8085"
    environment:
      - OLLAMA_BASE_URL=http://192.168.219.102:11434
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/fdsdb
      - SPRING_DATASOURCE_USERNAME=fds
      - SPRING_DATASOURCE_PASSWORD=fds1234
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
      - EUREKA_URL=http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
      - qdrant
      - postgres
    restart: unless-stopped

volumes:
  phase2_postgres-data:
    external: true
  phase2_qdrant-data:
    external: true
  phase2_redis-data:
    external: true
