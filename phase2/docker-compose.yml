# Integrated Docker Compose for FDS AI Assistant MSA
# FDS AI Assistant MSA 통합 Docker Compose

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=fdsdb
      - POSTGRES_USER=fds
      - POSTGRES_PASSWORD=fds1234
    volumes:
      - phase2_postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - phase2_redis-data:/data
    restart: unless-stopped

  # Qdrant Vector DB
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - phase2_qdrant-data:/qdrant/storage
    restart: unless-stopped

  # Eureka Server
  eureka-server:
    image: youngjinkwon/eureka-server:latest
    container_name: eureka-server
    ports:
      - "8761:8761"
    restart: unless-stopped

  # API Gateway
  api-gateway:
    image: youngjinkwon/api-gateway:latest
    container_name: api-gateway
    ports:
      - "8084:8084"
    depends_on:
      - eureka-server
    restart: unless-stopped

  # RAG Demo Blue (기본 활성 서비스)
  rag-demo-blue:
    image: youngjinkwon/rag-demo:latest
    container_name: rag-demo-blue
    ports:
      - "8085:8085"
    environment:
      - OLLAMA_BASE_URL=http://192.168.219.102:11434
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/fdsdb
      - SPRING_DATASOURCE_USERNAME=fds
      - SPRING_DATASOURCE_PASSWORD=fds1234
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
      - EUREKA_URL=http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
      - qdrant
      - postgres
    restart: unless-stopped

  # RAG Demo Green (새 버전 배포용 - 평소엔 중지)
  rag-demo-green:
    image: youngjinkwon/rag-demo:latest
    container_name: rag-demo-green
    ports:
      - "8086:8085"
    environment:
      - OLLAMA_BASE_URL=http://192.168.219.102:11434
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/fdsdb
      - SPRING_DATASOURCE_USERNAME=fds
      - SPRING_DATASOURCE_PASSWORD=fds1234
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
      - EUREKA_URL=http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
      - qdrant
      - postgres
    profiles:
      - green

  # Nginx (트래픽 라우터)
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - rag-demo-blue
    restart: unless-stopped

volumes:
  phase2_postgres-data:
    external: true
  phase2_qdrant-data:
    external: true
  phase2_redis-data:
    external: true
