# Integrated Docker Compose for FDS AI Assistant MSA
# FDS AI Assistant MSA 통합 Docker Compose

services:
  # Qdrant Vector DB - 벡터 데이터베이스
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  # Eureka Server - 서비스 디스커버리
  eureka-server:
    image: youngjinkwon/eureka-server:latest
    container_name: eureka-server
    ports:
      - "8761:8761"
    restart: unless-stopped

  # API Gateway - 외부 요청 라우팅
  api-gateway:
    image: youngjinkwon/api-gateway:latest
    container_name: api-gateway
    ports:
      - "8084:8084"
    depends_on:
      - eureka-server
    restart: unless-stopped

  # RAG Demo - FDS 문서 질의응답
  rag-demo:
    image: youngjinkwon/rag-demo:latest
    container_name: rag-demo
    ports:
      - "8085:8085"
    environment:
      - OLLAMA_BASE_URL=http://192.168.219.102:11434
    depends_on:
      - eureka-server
      - qdrant
    restart: unless-stopped

volumes:
  qdrant-data:
