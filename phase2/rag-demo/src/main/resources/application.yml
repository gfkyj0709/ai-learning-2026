server:
  port: 8085

spring:
  application:
    name: rag-demo

# LangChain4j Ollama 설정
langchain4j:
  ollama:
    chat-model:
      base-url: http://localhost:11434
      model-name: qwen2.5
      temperature: 0.7
      timeout: 120s
    embedding-model:
      base-url: http://localhost:11434
      model-name: nomic-embed-text
      timeout: 60s

# Qdrant 설정
qdrant:
  host: localhost
  port: 6334
  collection-name: fds-documents

logging:
  level:
    com.example.ragdemo: DEBUG
    dev.langchain4j: INFO
