# application.yml (기본 - 운영용, 로그 없음)
server:
  port: 8085

spring:
  application:
    name: rag-demo
  cloud:
    discovery:
      enabled: true

langchain4j:
  ollama:
    chat-model:
      base-url: http://localhost:11434
      model-name: qwen2.5
      temperature: 0.7
      timeout: 120s
    embedding-model:
      base-url: http://localhost:11434
      model-name: nomic-embed-text
      timeout: 60s

qdrant:
  host: localhost
  port: 6334
  collection-name: fds-documents

# Eureka 클라이언트 설정 / Eureka client configuration
eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    root: INFO

---
# application-dev.yml (개발용, 로그 풍부)
spring:
  config:
    activate:
      on-profile: dev

langchain4j:
  ollama:
    chat-model:
      log-requests: true
      log-responses: true

logging:
  level:
    com.example.ragdemo: DEBUG
    dev.langchain4j: DEBUG
